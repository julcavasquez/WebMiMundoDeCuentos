<div class="welcome-container">

  <!-- HEADER -->
  <div class="header">
    <!-- <div class="logo">📚</div> -->

    <h1>¡Bienvenido!</h1>

    <p>¿Quién eres?</p>
  </div>

  <!-- ROLES -->
  <div class="roles-grid">
    @for (role of roles(); track role.id) {

            <div
      class="role-card"
      [style.border-color]="role.color"
      (click)="selectRole(role)"
    >

      <div
        class="role-avatar"
        [style.background]="role.color"
      >
        <img [src]="'/assets/images/roles/'+role.icon" [alt]="role.nombre">
      </div>

      <h3>{{ role.nombre }}</h3>

    </div>

            }

    

  </div>

  <!-- FOOTER -->
  <div class="footer-text">
    🌟 Aprende y diviértete leyendo cuentos mágicos 🌟
  </div>

</div>
